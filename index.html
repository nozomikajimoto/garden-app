<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>庭の植物管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <span class="header-icon">🌿</span>
      <div>
        <h1>庭の植物管理</h1>
        <span class="header-sub">千葉県基準</span>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="timeline">タイムライン</button>
    <button class="tab" data-tab="monthly">月別</button>
  </nav>

  <!-- タイムラインタブ -->
  <div id="tab-timeline" class="tab-content">
    <div class="controls">
      <div class="filter-group">
        <span class="filter-label">種別</span>
        <select id="type-filter">
          <option value="">すべて</option>
          <option value="evergreen">常緑</option>
          <option value="deciduous">落葉</option>
          <option value="annual">一年草</option>
          <option value="perennial">宿根草</option>
        </select>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="swatch blooming-sw"></span>開花</span>
        <span class="legend-item"><span class="swatch both-sw"></span>開花＋葉</span>
        <span class="legend-item"><span class="swatch leaf-sw"></span>葉あり</span>
        <span class="legend-item"><span class="swatch none-sw"></span>葉なし</span>
        <span class="legend-item"><span class="dot fert-dot"></span>肥料</span>
        <span class="legend-item"><span class="dot prun-dot"></span>剪定</span>
      </div>
    </div>

    <div class="timeline-wrap">
      <div class="tl-header">
        <div class="tl-name-col"></div>
        <div class="tl-cells" id="month-labels"></div>
      </div>
      <div id="plant-rows"></div>
    </div>

    <div id="empty-state" class="empty-state hidden">
      <p>植物が登録されていません</p>
    </div>
  </div>

  <!-- 月別タブ -->
  <div id="tab-monthly" class="tab-content hidden">
    <div class="month-nav-row">
      <button class="month-arrow" id="prev-month">‹</button>
      <div class="month-display" id="month-display"></div>
      <button class="month-arrow" id="next-month">›</button>
    </div>
    <div class="monthly-grid" id="monthly-content"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
